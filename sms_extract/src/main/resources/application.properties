spring.application.name=sms_extract

server.port=8081

# event publisher
spring.kafka.producer.bootstrap-servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:29092}
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1
spring.kafka.producer.properties.retries=3
spring.kafka.producer.properties.acks=all
spring.kafka.producer.key-serializer= org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer = com.example.sms.sms_extract.serializer.SmsInfoSerializer
spring.kafka.topic-json.name=expense_service_topic
spring.kafka.producer.properties.spring.json.type.mapping=expense:com.example.sms.sms_extract.dto.TransactionDetailsDTO
security.basic.enable= false
security.ignored=/**


# spring boot mysql game


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Change it from 'userservice' to 'expense_db'
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:expense_db}?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
logging.level.org.springframework.security=DEBUG
logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.kafka=DEBUG


